<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>工程資源管理系統</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <header class="topbar">
      <div class="brand-wrap">
        <div class="brand-title">工程資源管理系統</div>
        <div class="brand-sub">機具・材料・車輛調度</div>
      </div>
      <button id="refreshBtn" class="icon-btn" type="button" aria-label="重新整理">↻</button>
    </header>

    <main class="page">
      <section id="homeView" class="view active">
        <div class="hero">
          <div class="hero-left">
            <div class="hero-title" id="userName">使用者</div>
            <div class="hero-sub" id="todayText"></div>
          </div>
          <div class="hero-badge">● 線上</div>
        </div>

        <div class="dashboard-grid">
          <button class="dashboard-card" data-nav="equipment" type="button">
            <div class="card-head">
              <span>🔧 機具管理</span>
              <span class="status-dot green"></span>
            </div>
            <div class="card-metrics">
              <div>
                <strong id="eqAvailable">0</strong>
                <span>可借用</span>
              </div>
              <div>
                <strong id="eqBorrowed">0</strong>
                <span>借出中</span>
              </div>
            </div>
            <div class="card-link">進入功能</div>
          </button>

          <button class="dashboard-card" data-nav="materials" type="button">
            <div class="card-head">
              <span>📦 材料管理</span>
              <span class="status-dot amber"></span>
            </div>
            <div class="card-metrics">
              <div>
                <strong id="matLow">0</strong>
                <span>低庫存</span>
              </div>
              <div>
                <strong id="matState">-</strong>
                <span>狀態</span>
              </div>
            </div>
            <div class="card-link">進入功能</div>
          </button>

          <button class="dashboard-card" data-nav="vehicles" type="button">
            <div class="card-head">
              <span>🚗 車輛調度</span>
              <span class="status-dot blue"></span>
            </div>
            <div class="card-metrics">
              <div>
                <strong id="vhAvailable">0</strong>
                <span>可使用</span>
              </div>
              <div>
                <strong id="vhReserved">0</strong>
                <span>使用中</span>
              </div>
            </div>
            <div class="card-link">進入功能</div>
          </button>
        </div>

        <section class="section-card">
          <div class="section-header">
            <div class="section-title">📋 我的使用中項目</div>
          </div>
          <div id="myActiveList" class="list-stack"></div>
        </section>
      </section>

      <section id="equipmentView" class="view">
        <div class="tools">
          <input id="equipmentSearch" class="input" placeholder="搜尋機具名稱 / 編號 / 儲位">
          <div class="chip-row">
            <button class="chip active" data-eq-status="" type="button">全部</button>
            <button class="chip" data-eq-status="available" type="button">可借用</button>
            <button class="chip" data-eq-status="borrowed" type="button">借出中</button>
          </div>
        </div>
        <div id="equipmentList" class="list-stack"></div>
      </section>

      <section id="materialsView" class="view">
        <div class="tools">
          <input id="materialSearch" class="input" placeholder="搜尋材料名稱 / 類別 / 儲位">
        </div>
        <div id="materialList" class="list-stack"></div>
      </section>

      <section id="vehiclesView" class="view">
        <div class="tools">
          <input id="vehicleDate" class="input" type="date">
          <input id="vehicleSearch" class="input" placeholder="搜尋車輛名稱 / 車牌 / 車種">
        </div>
        <div id="vehicleList" class="list-stack"></div>
      </section>

      <section id="myView" class="view">
        <section class="section-card">
          <div class="section-title">🔧 我的機具</div>
          <div id="myEquipment" class="list-stack compact"></div>
        </section>

        <section class="section-card">
          <div class="section-title">📦 我的材料紀錄</div>
          <div id="myMaterials" class="list-stack compact"></div>
        </section>

        <section class="section-card">
          <div class="section-title">🚗 我的車輛紀錄</div>
          <div id="myVehicles" class="list-stack compact"></div>
        </section>
      </section>
    </main>

    <nav class="bottom-nav">
      <button class="nav-btn active" data-nav="home" type="button">首頁</button>
      <button class="nav-btn" data-nav="equipment" type="button">機具</button>
      <button class="nav-btn" data-nav="materials" type="button">材料</button>
      <button class="nav-btn" data-nav="vehicles" type="button">車輛</button>
      <button class="nav-btn" data-nav="my" type="button">我的</button>
    </nav>
  </div>

  <div id="modal" class="modal hidden">
    <div class="modal-panel">
      <div class="modal-top">
        <div id="modalTitle" class="modal-title"></div>
        <button id="modalClose" class="icon-btn" type="button">✕</button>
      </div>
      <div id="modalBody" class="modal-body"></div>
    </div>
  </div>

  <div id="loading" class="loading hidden">
    <div class="loading-box">
      <div class="spinner"></div>
      <div>資料處理中...</div>
    </div>
  </div>

  <div id="toast" class="toast hidden"></div>

  <script src="app.js"></script>
</body>
</html>
