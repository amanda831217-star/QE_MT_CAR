<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>Site Asset System</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <header class="topbar">
      <div class="brand-wrap">
        <div class="brand-title">Site Asset System</div>
        <div class="brand-sub">Mobile Dispatch</div>
      </div>
      <button id="refreshBtn" class="icon-btn" type="button" aria-label="refresh">↻</button>
    </header>

    <main class="page">
      <section id="homeView" class="view active">
        <div class="hero">
          <div class="hero-left">
            <div class="hero-title" id="userName">User</div>
            <div class="hero-sub" id="todayText"></div>
          </div>
          <div class="hero-badge">Online</div>
        </div>

        <div class="dashboard-grid">
          <button class="dashboard-card" data-nav="equipment" type="button">
            <div class="card-head">
              <span>Equipment</span>
              <span class="status-dot green"></span>
            </div>
            <div class="card-metrics">
              <div>
                <strong id="eqAvailable">0</strong>
                <span>Available</span>
              </div>
              <div>
                <strong id="eqBorrowed">0</strong>
                <span>Borrowed</span>
              </div>
            </div>
            <div class="card-link">Open</div>
          </button>

          <button class="dashboard-card" data-nav="materials" type="button">
            <div class="card-head">
              <span>Materials</span>
              <span class="status-dot amber"></span>
            </div>
            <div class="card-metrics">
              <div>
                <strong id="matLow">0</strong>
                <span>Low</span>
              </div>
              <div>
                <strong id="matState">-</strong>
                <span>Status</span>
              </div>
            </div>
            <div class="card-link">Open</div>
          </button>

          <button class="dashboard-card" data-nav="vehicles" type="button">
            <div class="card-head">
              <span>Vehicles</span>
              <span class="status-dot blue"></span>
            </div>
            <div class="card-metrics">
              <div>
                <strong id="vhAvailable">0</strong>
                <span>Available</span>
              </div>
              <div>
                <strong id="vhReserved">0</strong>
                <span>Reserved</span>
              </div>
            </div>
            <div class="card-link">Open</div>
          </button>
        </div>

        <section class="section-card">
          <div class="section-header">
            <div class="section-title">My Active Items</div>
          </div>
          <div id="myActiveList" class="list-stack"></div>
        </section>
      </section>

      <section id="equipmentView" class="view">
        <div class="tools">
          <input id="equipmentSearch" class="input" placeholder="Search equipment">
          <div class="chip-row">
            <button class="chip active" data-eq-status="" type="button">All</button>
            <button class="chip" data-eq-status="available" type="button">Available</button>
            <button class="chip" data-eq-status="borrowed" type="button">Borrowed</button>
          </div>
        </div>
        <div id="equipmentList" class="list-stack"></div>
      </section>

      <section id="materialsView" class="view">
        <div class="tools">
          <input id="materialSearch" class="input" placeholder="Search materials">
        </div>
        <div id="materialList" class="list-stack"></div>
      </section>

      <section id="vehiclesView" class="view">
        <div class="tools">
          <input id="vehicleDate" class="input" type="date">
          <input id="vehicleSearch" class="input" placeholder="Search vehicles">
        </div>
        <div id="vehicleList" class="list-stack"></div>
      </section>

      <section id="myView" class="view">
        <section class="section-card">
          <div class="section-title">Equipment</div>
          <div id="myEquipment" class="list-stack compact"></div>
        </section>

        <section class="section-card">
          <div class="section-title">Materials</div>
          <div id="myMaterials" class="list-stack compact"></div>
        </section>

        <section class="section-card">
          <div class="section-title">Vehicles</div>
          <div id="myVehicles" class="list-stack compact"></div>
        </section>
      </section>
    </main>

    <nav class="bottom-nav">
      <button class="nav-btn active" data-nav="home" type="button">Home</button>
      <button class="nav-btn" data-nav="equipment" type="button">Equipment</button>
      <button class="nav-btn" data-nav="materials" type="button">Materials</button>
      <button class="nav-btn" data-nav="vehicles" type="button">Vehicles</button>
      <button class="nav-btn" data-nav="my" type="button">My</button>
    </nav>
  </div>

  <div id="modal" class="modal hidden">
    <div class="modal-panel">
      <div class="modal-top">
        <div id="modalTitle" class="modal-title"></div>
        <button id="modalClose" class="icon-btn" type="button">✕</button>
      </div>
      <div id="modalBody" class="modal-body"></div>
    </div>
  </div>

  <div id="loading" class="loading hidden">
    <div class="loading-box">
      <div class="spinner"></div>
      <div>Processing...</div>
    </div>
  </div>

  <div id="toast" class="toast hidden"></div>

  <script src="app.js"></script>
</body>
</html>
